services:
  # ==================== PostgreSQL + pgvector ====================
  db:
    image: pgvector/pgvector:pg15
    container_name: chatbot_postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chatbot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chatbot_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Redis (Caching + Rate Limiting + Celery Broker) ====================
  redis:
    image: redis:7-alpine
    container_name: chatbot_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== FastAPI Web Application ====================
  web:
    build: .
    container_name: chatbot_fastapi_web
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./uploads:/app/uploads
      - ./chroma_db:/app/chroma_db
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ==================== Celery Worker (Background Tasks) ====================
  worker:
    build: .
    container_name: chatbot_celery_worker
    restart: always
    command: celery -A app.core.celery_app:celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./uploads:/app/uploads
      - ./chroma_db:/app/chroma_db
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ==================== Prometheus (Metrics Scraper) ====================
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: chatbot_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - web

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
